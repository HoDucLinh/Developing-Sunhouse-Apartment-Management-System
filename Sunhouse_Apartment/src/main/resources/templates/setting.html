<div th:replace="~{fragments/base :: layout}">
    <div th:fragment="content">
        <main class="container my-5">

            <div class="card shadow-lg border-0 p-4 mx-auto" style="max-width: 900px;">
                <h3 class="text-center mb-4 fw-bold">Chỉnh sửa thông tin hệ thống</h3>

                <!-- FORM CẬP NHẬT THÔNG TIN -->
                <form th:action="@{/update-info}" method="post" class="mb-5">
                    <div class="row g-3">
                        <div class="col-md-6">
                            <label class="form-label">Họ tên người quản lý</label>
                            <input type="text" class="form-control"
                                   name="fullName"
                                   th:value="${apartmentInfo.name}" required/>
                        </div>

                        <div class="col-md-6">
                            <label class="form-label">Email</label>
                            <input type="email" class="form-control"
                                   name="email"
                                   th:value="${apartmentInfo.email}"/>
                        </div>

                        <div class="col-md-6">
                            <label class="form-label">Hotline</label>
                            <input type="text" class="form-control"
                                   name="hotline"
                                   th:value="${apartmentInfo.hotline}"/>
                        </div>

                        <div class="col-md-6">
                            <label class="form-label">Địa chỉ</label>
                            <input type="text" class="form-control"
                                   name="address"
                                   th:value="${apartmentInfo.address}"/>
                        </div>

                        <div class="col-12">
                            <label class="form-label">Mô tả</label>
                            <textarea class="form-control"
                                      name="description"
                                      rows="3"
                                      th:text="${apartmentInfo.description}">
                            </textarea>
                        </div>
                    </div>

                    <button type="submit"
                            class="btn btn-primary mt-4 w-100 fw-semibold">
                        Cập nhật thông tin
                    </button>
                </form>


                <!-- GALLERY ẢNH -->
                <hr class="my-4">

                <h5 class="mb-3 fw-bold">Hình ảnh hệ thống</h5>

                <div class="row g-3">

                    <!-- Ảnh hiện có -->
                    <div class="col-md-4"
                         th:each="img : ${apartmentInfo.images}">

                        <div class="card border-0 shadow-sm position-relative image-card">

                            <!-- Nút Xóa -->
                            <form th:action="@{/delete-image}"
                                  method="post"
                                  class="delete-form"
                                  onsubmit="return confirm('Bạn có chắc muốn xóa hình ảnh này?');">

                                <input type="hidden" name="_method" value="delete"/>
                                <input type="hidden" name="imageId" th:value="${img.id}"/>

                                <button type="submit"
                                        class="btn btn-danger btn-sm delete-btn">
                                    ✕
                                </button>
                            </form>

                            <img th:src="${img.imageUrl}"
                                 class="card-img-top rounded"
                                 style="height:200px; object-fit:cover;">

                        </div>
                    </div>

                    <!-- Nút thêm ảnh -->
                    <div class="col-md-4">
                        <div class="card border-2 border-dashed text-center d-flex justify-content-center align-items-center add-card"
                             style="height:200px; cursor:pointer;"
                             onclick="document.getElementById('imageInput').click();">

                            <div>
                                <h1 class="text-primary fw-bold">+</h1>
                                <p class="text-muted mb-0">Thêm ảnh</p>
                            </div>
                        </div>
                    </div>
                    <!-- FORM UPLOAD ẨN -->
                    <form th:action="@{/add-image}"
                          method="post"
                          enctype="multipart/form-data"
                          id="uploadForm">
                        <input type="file"
                               name="image"
                               id="imageInput"
                               accept="image/*"
                               hidden
                               onchange="document.getElementById('uploadForm').submit();"/>
                    </form>

                </div>
            </div>

        </main>
    </div>
</div>
<style>
    .image-card {
        overflow: hidden;
    }

    .delete-btn {
        position: absolute;
        top: 10px;
        right: 10px;
        border-radius: 50%;
        width: 32px;
        height: 32px;
        padding: 0;
        display: none;
        align-items: center;
        justify-content: center;
    }

    .image-card:hover .delete-btn {
        display: flex;
    }

    .delete-btn:hover {
        transform: scale(1.1);
    }

    .add-card:hover {
        background-color: #f8f9fa;
    }
</style>
